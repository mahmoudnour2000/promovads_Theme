<!DOCTYPE html>
<html lang="ar" dir="rtl" class="demo-sports">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>خبر رياضي — سبورت+</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="../assets/css/pds-core.css">
<link rel="stylesheet" href="css/sports-ar.css">
</head>
<body class="page-inner">

<div class="progress-bar" id="progress"></div>

<div class="sport-topbar">
  <div class="wrap">
    <div class="sport-topbar__left">
      <span><i class="fas fa-newspaper" style="color:#fca5a5;margin-left:5px"></i> أخبار رياضية</span>
      <span><i class="fas fa-calendar-alt" style="color:#fca5a5;margin-left:5px"></i> الاثنين، 15 يونيو 2026</span>
    </div>
    <div class="sport-topbar__social">
      <a href="#"><i class="fab fa-x-twitter"></i></a>
      <a href="#"><i class="fab fa-youtube"></i></a>
      <a href="#"><i class="fab fa-instagram"></i></a>
    </div>
  </div>
</div>

<header class="sport-header sport-header--compact">
  <div class="wrap">
    <div class="sport-header__bar">
      <a href="index.html" class="sport-logo">
        <div class="sport-logo__icon"><i class="fas fa-futbol"></i></div>
        <div>سبورت<span>+</span><span class="sport-logo__sub">رياضة</span></div>
      </a>
      <div class="sport-header__actions">
        <button class="sport-btn-icon search-trigger" title="بحث"><i class="fas fa-search"></i></button>
        <a href="archive.html" class="sport-btn-live"><i class="fas fa-newspaper"></i> الأرشيف</a>
      </div>
    </div>
    <nav class="sport-nav site-nav site-nav--underline" aria-label="الرياضات">
      <ul class="sport-nav__list site-nav__list">
      <li class="sport-nav__item site-nav__item active"><a href="index.html">الرئيسية</a></li>
      <li class="sport-nav__item site-nav__item" data-cat="football"><a href="archive.html?cat=football">كرة قدم</a></li>
      <li class="sport-nav__item site-nav__item" data-cat="basketball"><a href="archive.html?cat=basketball">كرة سلة</a></li>
      <li class="sport-nav__item site-nav__item" data-cat="tennis"><a href="archive.html?cat=tennis">تنس</a></li>
      <li class="sport-nav__item site-nav__item" data-cat="f1"><a href="archive.html?cat=f1">فورمولا 1</a></li>
      <li class="sport-nav__item site-nav__item" data-cat="boxing"><a href="archive.html?cat=boxing">ملاكمة</a></li>
      <li class="sport-nav__item site-nav__item" data-cat="cricket"><a href="archive.html?cat=cricket">كريكيت</a></li>
      </ul>
    </nav>
  </div>
</header>

<div class="sport-ticker">
  <div class="sport-ticker__label"><span class="sport-ticker__dot"></span>عاجل</div>
  <div class="sport-ticker__track">
    <div class="sport-ticker__inner ticker__inner" id="tickerInner"></div>
  </div>
</div>

<main style="padding:36px 0 60px">
<div class="wrap">
  <div class="grid g-main" style="gap:36px">
    <article id="articleContent"></article>
    <aside class="sidebar" id="singleSidebar"></aside>
  </div>
</div>
</main>

<div id="siteFooter"></div>
<button class="back-top" id="backTop"><i class="fas fa-chevron-up"></i></button>

<div class="search-overlay" id="searchOverlay">
  <div class="search-box">
    <button class="search-close" aria-label="إغلاق"><i class="fas fa-times"></i></button>
    <h3>ابحث في الأخبار الرياضية</h3>
    <div class="search-input-wrap"><input type="search" placeholder="اكتب للبحث…" autofocus></div>
  </div>
</div>

<script src="data/articles.js"></script>
<script src="js/shared.js"></script>
<script src="js/single.js"></script>
<script src="../assets/js/pds-main.js"></script>
