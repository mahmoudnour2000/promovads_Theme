<!DOCTYPE html>
<html lang="ar" dir="rtl" class="demo-gaming">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>خبر ألعاب — جيمر+</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="../assets/css/pds-core.css">
<link rel="stylesheet" href="css/game-ar.css">
</head>
<body class="page-inner">

<div class="progress-bar" id="progress"></div>

<div class="game-topbar">
  <div class="wrap">
    <div class="game-topbar__left">
      <span class="game-topbar__live"><i class="fas fa-newspaper"></i> أخبار الألعاب يومياً</span>
      <span><i class="fas fa-calendar-alt" style="color:#d8b4fe;margin-left:5px"></i> الاثنين، 15 يونيو 2026</span>
    </div>
    <div class="game-topbar__social">
      <a href="#"><i class="fab fa-x-twitter"></i></a>
      <a href="#"><i class="fab fa-twitch"></i></a>
      <a href="#"><i class="fab fa-discord"></i></a>
    </div>
  </div>
</div>

<header class="game-header game-header--compact">
  <div class="wrap">
    <div class="game-header__bar">
      <a href="index.html" class="game-logo">
        <div class="game-logo__icon"><i class="fas fa-gamepad"></i></div>
        <div>جيمر<span>+</span><span class="game-logo__sub">ألعاب</span></div>
      </a>
      <div class="game-header__actions">
        <button class="game-btn-icon search-trigger" title="بحث"><i class="fas fa-search"></i></button>
        <a href="#" class="game-btn-live"><i class="fas fa-bolt"></i> مباشر</a>
      </div>
    </div>
    <nav class="game-nav site-nav site-nav--skew" aria-label="أقسام الألعاب">
      <ul class="game-nav__list site-nav__list">
      <li class="game-nav__item site-nav__item active"><a href="index.html"><i class="fas fa-home" aria-hidden="true"></i><span>الرئيسية</span></a></li>
      <li class="game-nav__item site-nav__item" data-cat="pc"><a href="archive.html?cat=pc"><i class="fas fa-desktop" aria-hidden="true"></i><span>PC</span></a></li>
      <li class="game-nav__item site-nav__item" data-cat="console"><a href="archive.html?cat=console"><i class="fas fa-gamepad" aria-hidden="true"></i><span>كونsole</span></a></li>
      <li class="game-nav__item site-nav__item" data-cat="mobile"><a href="archive.html?cat=mobile"><i class="fas fa-mobile-screen" aria-hidden="true"></i><span>موبايل</span></a></li>
      <li class="game-nav__item site-nav__item" data-cat="esports"><a href="archive.html?cat=esports"><i class="fas fa-trophy" aria-hidden="true"></i><span>eSports</span></a></li>
      <li class="game-nav__item site-nav__item" data-cat="reviews"><a href="archive.html?cat=reviews"><i class="fas fa-star" aria-hidden="true"></i><span>مراجعات</span></a></li>
      <li class="game-nav__item site-nav__item" data-cat="releases"><a href="archive.html?cat=releases"><i class="fas fa-rocket" aria-hidden="true"></i><span>إصدارات</span></a></li>
      </ul>
    </nav>
  </div>
</header>

<div class="game-ticker">
  <div class="game-ticker__label"><span class="game-ticker__dot"></span>عاجل</div>
  <div class="game-ticker__track">
    <div class="game-ticker__inner ticker__inner" id="tickerInner"></div>
  </div>
</div>

<main style="padding:36px 0 60px">
<div class="wrap">
  <div class="grid g-main" style="gap:36px">
    <article id="articleContent"></article>
    <aside class="sidebar" id="singleSidebar"></aside>
  </div>
</div>
</main>

<div id="siteFooter"></div>
<button class="back-top" id="backTop"><i class="fas fa-chevron-up"></i></button>

<div class="search-overlay" id="searchOverlay">
  <div class="search-box">
    <button class="search-close" aria-label="إغلاق"><i class="fas fa-times"></i></button>
    <h3>ابحث في أخبار الألعاب</h3>
    <div class="search-input-wrap"><input type="search" placeholder="اكتب للبحث…" autofocus></div>
  </div>
</div>

<script src="data/articles.js"></script>
<script src="js/shared.js"></script>
<script src="js/single.js"></script>
<script src="../assets/js/pds-main.js"></script>
</body>
</html>
